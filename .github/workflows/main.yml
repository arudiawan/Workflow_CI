name: Machine Learning Lifecycle CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  mlflow-pipeline-execution:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Core Environment Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow scikit-learn pandas

    - name: Execute MLflow Local Validation Run
      run: |
        echo "Initiating standardized model training validation via MLflow Run..."
        mlflow run MLProject --env-manager local
