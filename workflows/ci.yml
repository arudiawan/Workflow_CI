name: Machine Learning Lifecycle CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  environment-validation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node: '3.10'

    - name: Install Dependencies Verification
      run: |
        python -m pip install --upgrade pip
        pip install mlflow scikit-learn pandas

    - name: Validate MLProject Structure
      run: |
        echo "Checking if MLProject configuration files exist..."
        test -f MLProject && echo "MLProject file found."
        test -f conda.yaml && echo "conda.yaml file found."
